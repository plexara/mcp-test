<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  mcp-test social / Open Graph card. 1200x630, midnight + copper Plexara
  palette. Composition: left 60% typography (eyebrow + wordmark + tagline +
  URL), right 40% a stylized JSON-RPC tools/call envelope rendered like a
  real code block (the protocol IS the project's identity).

  Self-contained: no external font fetch. Falls back to a system stack so
  cairosvg / rsvg-convert renders consistently in CI without bundling
  Outfit. Layout carries the design; the typography is supportive.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Ambient copper glow in the upper-right corner. Very low alpha
         so it reads as atmosphere, not a flashy gradient. -->
    <radialGradient id="glow" cx="92%" cy="8%" r="55%">
      <stop offset="0%"   stop-color="#14b8ab" stop-opacity="0.22" />
      <stop offset="40%"  stop-color="#0f77b2" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#020617" stop-opacity="0" />
    </radialGradient>

    <!-- Left-edge accent rule: deep teal at top, copper-300 at bottom. -->
    <linearGradient id="leftRule" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#073d5c" />
      <stop offset="50%"  stop-color="#14b8ab" />
      <stop offset="100%" stop-color="#5fe8df" />
    </linearGradient>

    <!-- Underline rule under the wordmark. Goes copper-700 -> copper-300
         so the eye reads it left-to-right. -->
    <linearGradient id="hr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1388ae" />
      <stop offset="60%"  stop-color="#14b8ab" />
      <stop offset="100%" stop-color="#5fe8df" stop-opacity="0" />
    </linearGradient>

    <!-- Subtle dot-grid pattern. 32px spacing, single-pixel dots,
         very low opacity so it sits in the background like graph paper. -->
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="1" fill="#1e293b" />
    </pattern>

    <!-- Soft copper halo behind the JSON envelope. -->
    <radialGradient id="codeGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#14b8ab" stop-opacity="0.10" />
      <stop offset="60%"  stop-color="#073d5c" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#020617" stop-opacity="0" />
    </radialGradient>

    <!-- Plexara logomark, scaled down. Source: docs/images/logo.svg
         (378x338 viewBox), inlined here as the eyebrow brand mark. -->
    <symbol id="plexara-mark" viewBox="0 0 378 338">
      <path fill="#149bab" d="M 103.85 139.14 C 96.99 122.17 93.62 104.70 92.62 86.52 C 91.67 69.18 95.93 49.56 108.43 37.18 C 111.61 34.03 114.97 30.64 118.55 28.34 Q 129.31 21.41 142.18 17.89 Q 145.02 17.12 150.59 15.87 Q 155.75 14.71 165.39 13.74 Q 194.02 10.85 222.45 14.66 A 3.20 3.09 57.3 0 1 223.00 14.79 Q 224.59 15.33 226.31 15.46 Q 233.91 16.03 249.62 22.04 Q 260.72 26.29 268.82 34.68 A 0.35 0.35 0.0 0 1 268.65 35.27 Q 257.61 37.77 246.75 42.14 A 1.20 1.19 -42.5 0 1 245.77 42.10 Q 235.33 36.92 225.66 35.11 Q 223.11 34.63 216.38 33.66 Q 210.15 32.76 207.06 32.70 C 201.18 32.58 195.95 31.77 190.31 31.86 Q 176.46 32.09 167.04 33.11 Q 158.41 34.04 148.55 36.53 C 133.52 40.31 120.19 49.16 115.39 64.20 C 114.81 66.02 114.01 68.36 113.73 69.97 Q 111.87 80.64 112.87 92.26 Q 114.36 109.47 120.48 126.11 A 0.90 0.90 0.0 0 1 120.19 127.12 L 104.60 139.34 A 0.49 0.48 -30.0 0 1 103.85 139.14 Z" />
      <path fill="#0f77b2" d="M 91.62 44.14 Q 91.62 44.22 91.63 44.45 Q 91.64 44.65 91.58 44.77 Q 89.64 48.49 88.71 51.01 Q 87.92 53.14 85.89 60.27 A 0.75 0.75 0.0 0 1 85.20 60.81 Q 84.30 60.85 80.26 60.92 Q 69.00 61.11 57.99 65.46 Q 45.68 70.33 38.44 81.15 Q 36.90 83.45 35.18 88.86 Q 33.50 94.14 33.88 102.00 Q 34.39 112.67 39.36 124.41 Q 47.10 142.69 58.50 157.28 Q 63.60 163.81 66.62 167.78 A 0.56 0.55 50.8 0 1 66.55 168.54 L 52.77 180.64 A 1.03 1.03 0.0 0 1 51.41 180.64 Q 50.83 180.13 49.43 178.35 C 35.14 160.13 23.12 141.68 17.00 120.77 C 13.44 108.59 12.54 97.12 15.54 84.54 C 15.60 84.32 15.88 84.11 15.93 83.92 C 20.20 67.41 31.61 55.54 47.40 48.43 Q 68.07 39.12 91.96 41.65 A 0.83 0.83 0.0 0 1 92.69 42.36 Q 92.78 43.09 92.03 43.47 A 0.78 0.77 77.1 0 0 91.62 44.14 Z" />
      <path fill="#11a9aa" d="M 270.14 237.58 A 0.90 0.90 0.0 0 1 269.16 236.48 Q 272.37 222.49 279.67 210.69 C 283.37 204.71 289.31 197.26 295.30 190.22 Q 310.60 172.23 316.40 164.65 Q 323.92 154.83 332.95 140.26 Q 343.71 122.90 346.16 103.51 C 348.23 87.18 340.09 74.09 325.49 66.91 Q 317.16 62.82 307.25 61.67 Q 298.55 60.67 288.50 61.40 Q 280.00 62.02 270.05 64.93 C 250.42 70.66 232.56 80.05 215.38 91.04 A 0.84 0.84 0.0 0 1 214.42 91.01 L 198.41 79.36 A 0.35 0.34 -44.5 0 1 198.42 78.80 Q 216.69 65.79 237.53 56.01 Q 254.74 47.94 272.63 43.91 Q 279.40 42.39 288.99 41.56 Q 307.82 39.94 323.80 45.12 Q 340.83 50.63 350.75 60.65 C 363.20 73.22 368.24 90.95 365.53 108.81 Q 362.79 126.93 353.93 143.26 Q 342.47 164.40 327.03 183.03 Q 305.01 209.61 303.39 211.64 Q 294.97 222.14 290.09 234.46 A 1.51 1.51 0.0 0 1 288.87 235.40 L 270.14 237.58 Z" />
      <path fill="#0f77b2" d="M 123.53 69.52 A 0.37 0.37 0.0 0 1 123.28 68.90 Q 124.22 67.87 124.33 66.69 A 2.20 2.20 0.0 0 1 124.51 65.98 Q 127.81 58.73 133.43 53.53 A 1.34 1.31 -66.9 0 1 134.27 53.18 Q 136.06 53.09 137.66 53.80 Q 156.96 62.33 172.46 72.54 C 179.86 77.40 192.21 86.10 202.09 93.66 Q 227.62 113.20 247.57 129.30 A 1.82 1.81 -59.7 0 1 248.11 131.39 L 241.20 148.59 A 0.69 0.69 0.0 0 1 240.03 148.77 L 239.17 147.74 A 0.07 0.07 0.0 0 0 239.14 147.71 C 218.77 131.89 199.01 116.04 178.65 100.83 Q 155.38 83.46 129.71 72.04 Q 124.14 69.57 123.53 69.52 Z" />
      <path fill="#149bab" d="M 286.60 71.92 L 287.23 75.01 A 0.54 0.47 40.9 0 1 287.25 75.15 Q 288.46 92.00 284.13 112.08 Q 281.90 122.39 280.75 125.96 Q 275.90 140.99 270.44 154.20 C 267.07 162.34 262.92 169.23 258.14 178.40 Q 254.44 185.52 248.59 194.98 C 241.03 207.20 234.49 218.65 225.77 229.01 Q 222.55 232.83 218.14 234.09 A 2.98 2.92 -47.5 0 1 216.85 234.16 Q 207.27 232.54 198.52 227.93 A 0.35 0.35 0.0 0 1 198.51 227.32 Q 200.43 226.22 201.77 225.02 C 207.92 219.51 213.05 213.23 217.62 206.32 Q 233.09 182.90 244.36 161.88 Q 255.19 141.68 262.08 118.06 Q 264.05 111.29 265.32 104.15 C 267.06 94.32 268.01 86.06 267.40 76.33 A 0.74 0.74 0.0 0 1 267.86 75.60 Q 276.14 72.15 285.75 71.28 A 0.80 0.79 81.6 0 1 286.60 71.92 Z" />
      <path fill="#1388ae" d="M 166.33 103.68 L 181.78 114.93 A 0.31 0.31 0.0 0 1 181.79 115.42 Q 160.59 132.35 156.70 135.39 C 149.51 141.00 144.14 145.77 136.98 150.94 Q 132.01 154.53 127.28 158.34 Q 109.90 172.34 95.42 182.96 Q 86.31 189.64 80.06 195.10 C 69.99 203.90 60.48 212.78 55.99 224.72 A 3.37 2.93 -35.8 0 0 55.80 225.53 Q 55.44 229.14 57.42 231.82 C 61.72 237.65 73.15 241.34 80.01 242.60 A 1.44 1.33 -19.2 0 1 80.63 242.87 Q 81.22 243.32 82.02 243.26 A 1.17 1.16 84.0 0 1 83.23 244.25 Q 84.46 252.32 85.51 262.52 A 1.27 1.26 4.6 0 1 83.92 263.87 Q 79.88 262.77 77.58 262.36 Q 70.54 261.11 60.33 257.14 C 50.90 253.49 40.84 246.52 36.96 236.58 C 33.18 226.93 36.65 215.56 42.40 207.13 Q 52.14 192.86 66.89 180.38 Q 75.31 173.24 104.44 151.32 Q 113.98 144.14 120.91 138.49 C 128.75 132.10 135.62 127.17 142.82 121.27 Q 155.08 111.22 165.42 103.68 A 0.78 0.77 44.6 0 1 166.33 103.68 Z" />
      <path fill="#0f77b2" d="M 299.93 170.06 L 287.65 184.66 A 0.35 0.35 0.0 0 1 287.18 184.72 L 271.83 173.56 A 0.35 0.35 0.0 0 1 271.72 173.13 L 280.04 155.62 A 0.35 0.35 0.0 0 1 280.56 155.49 L 299.87 169.55 A 0.35 0.35 0.0 0 1 299.93 170.06 Z" />
      <path fill="#127fb0" d="M 329.23 196.51 Q 336.59 204.07 341.18 213.78 Q 343.87 219.47 344.56 224.93 Q 345.25 230.43 343.17 235.87 Q 341.54 240.13 338.51 244.26 Q 336.34 247.22 331.44 250.67 Q 322.87 256.71 312.35 259.89 Q 300.35 263.51 287.75 264.85 Q 285.85 265.05 285.04 265.15 Q 254.33 268.82 223.53 265.19 Q 215.02 264.19 203.11 260.89 Q 190.37 257.36 178.71 250.33 C 163.26 241.01 151.57 227.32 141.20 210.81 Q 130.07 193.10 121.15 176.90 A 1.37 1.35 -33.6 0 1 121.51 175.17 L 136.15 163.69 A 0.42 0.41 -32.9 0 1 136.77 163.82 Q 148.11 184.93 162.27 206.48 C 172.05 221.37 185.47 234.33 202.71 240.05 C 209.06 242.15 216.55 244.05 223.61 244.94 Q 243.30 247.44 260.25 247.03 Q 267.68 246.85 287.00 245.24 Q 288.52 245.12 299.49 243.10 A 1.17 0.97 23.7 0 0 299.70 243.04 Q 300.54 242.68 300.60 242.66 Q 308.01 241.03 315.90 237.17 Q 321.71 234.33 323.87 230.26 A 3.36 3.11 -27.9 0 0 324.20 229.32 Q 325.06 224.83 322.19 219.92 Q 319.12 214.67 316.45 211.49 A 0.67 0.67 0.0 0 1 316.45 210.63 L 328.28 196.55 A 0.65 0.64 -47.0 0 1 329.23 196.51 Z" />
      <path fill="#127fb0" d="M 90.59 198.56 A 0.98 0.98 0.0 0 1 92.02 198.70 Q 103.73 214.09 109.25 229.75 Q 110.78 234.09 111.62 238.82 Q 113.92 251.68 114.41 259.27 Q 115.09 269.91 116.16 278.08 C 117.30 286.75 119.17 295.65 126.09 300.99 Q 128.16 302.59 130.91 303.07 Q 132.93 303.42 136.06 302.58 Q 142.36 300.90 147.74 296.72 C 159.87 287.27 169.89 274.97 178.61 262.44 A 0.78 0.78 0.0 0 1 179.54 262.16 L 198.31 269.71 A 0.03 0.03 0.0 0 1 198.33 269.75 C 192.15 278.50 186.48 285.45 179.74 293.33 C 170.43 304.22 160.08 313.31 147.98 319.44 Q 141.78 322.58 133.98 322.87 C 108.82 323.82 98.77 300.55 96.15 279.74 Q 95.97 278.32 95.84 277.80 A 1.27 0.03 75.5 0 1 95.61 276.81 Q 94.80 266.36 94.22 258.00 C 94.04 255.43 93.45 252.41 93.04 249.03 Q 90.50 228.05 77.18 211.87 A 1.21 1.20 -40.4 0 1 77.32 210.21 L 90.59 198.56 Z" />
      <path fill="#0f77b2" d="M 124.58 266.39 L 122.41 247.79 A 0.59 0.59 0.0 0 1 122.99 247.13 Q 141.91 246.82 146.72 246.11 Q 153.92 245.04 155.73 245.15 A 1.18 1.11 65.1 0 1 156.33 245.39 L 170.84 256.91 A 0.68 0.67 37.8 0 1 170.96 257.84 L 167.09 263.17 A 1.01 0.94 -78.3 0 1 166.58 263.53 C 162.85 264.65 159.57 264.61 155.66 265.19 Q 140.54 267.40 124.95 266.74 A 0.40 0.38 87.4 0 1 124.58 266.39 Z" />
      <path fill="#149bab" d="M 208.77 272.65 C 212.71 276.79 218.82 285.00 224.24 289.85 C 229.41 294.47 235.42 299.41 242.13 302.09 Q 247.97 304.42 253.06 301.76 C 260.90 297.66 262.82 284.57 264.22 276.84 A 0.69 0.67 -85.7 0 1 264.86 276.28 Q 268.85 276.13 281.58 275.14 Q 282.04 275.11 282.88 274.72 Q 283.49 274.43 284.06 275.24 A 0.83 0.81 31.7 0 1 284.20 275.81 C 283.39 282.79 282.68 288.41 280.73 294.29 C 276.69 306.51 270.64 316.91 257.94 321.44 C 248.73 324.72 237.94 322.55 229.25 317.76 C 216.63 310.80 205.81 299.91 196.85 288.92 A 0.94 0.94 0.0 0 1 196.82 287.76 L 207.77 272.72 A 0.65 0.65 0.0 0 1 208.77 272.65 Z" />
    </symbol>

    <!-- Common font stacks for SVG <text>. Sans is for the headline +
         body, mono is for code / URL. We don't fetch webfonts; the layout
         carries the design and the fallback chain picks something close. -->
    <style>
      .sans {
        font-family: "Outfit", "Inter", "Helvetica Neue", "Helvetica", "Arial", sans-serif;
      }
      .body {
        font-family: "DM Sans", "Inter", "Helvetica Neue", "Helvetica", "Arial", sans-serif;
      }
      .mono {
        font-family: "JetBrains Mono", "SF Mono", "Menlo", "Consolas", "DejaVu Sans Mono", monospace;
      }
    </style>
  </defs>

  <!-- Layer 1: midnight base -->
  <rect width="1200" height="630" fill="#020617" />

  <!-- Layer 2: dot-grid graph paper -->
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5" />

  <!-- Layer 3: copper ambient glow -->
  <rect width="1200" height="630" fill="url(#glow)" />

  <!-- Layer 4: 4px copper rule on the very left edge -->
  <rect x="0" y="0" width="4" height="630" fill="url(#leftRule)" />

  <!-- Layer 5: corner printer's marks (top-left and bottom-right copper L-marks) -->
  <g stroke="#14b8ab" stroke-width="1.5" fill="none" opacity="0.45">
    <path d="M 32 32 L 32 64 M 32 32 L 64 32" />
    <path d="M 1168 598 L 1168 566 M 1168 598 L 1136 598" />
  </g>

  <!-- ============================================================ -->
  <!-- LEFT BLOCK: typography                                       -->
  <!-- ============================================================ -->

  <!-- Eyebrow row: Plexara logomark + uppercase eyebrow text -->
  <g transform="translate(80, 80)">
    <use href="#plexara-mark" x="0" y="0" width="42" height="38" />
    <text x="58" y="26" class="body" font-size="16" font-weight="500" letter-spacing="3.6"
          fill="#5fe8df" text-rendering="geometricPrecision">PLEXARA &#8729; OPEN SOURCE</text>
  </g>

  <!-- Top-right meta line: version + license -->
  <text x="1120" y="106" text-anchor="end" class="mono" font-size="16" font-weight="400"
        letter-spacing="0.5" fill="#94a3b8" text-rendering="geometricPrecision">v1.2.0  /  Apache 2.0</text>

  <!-- Hero wordmark -->
  <text x="80" y="280" class="sans" font-size="132" font-weight="700"
        letter-spacing="-3" fill="#f8fafc" text-rendering="geometricPrecision">mcp-test</text>

  <!-- Underline rule (480px wide gradient) -->
  <rect x="80" y="306" width="480" height="3" fill="url(#hr)" />

  <!-- Tagline (two lines, second slightly dimmer for editorial rhythm) -->
  <text x="80" y="372" class="body" font-size="30" font-weight="400"
        fill="#e2e8f0" text-rendering="geometricPrecision">A controllable Model Context Protocol server</text>
  <text x="80" y="412" class="body" font-size="30" font-weight="400"
        fill="#cbd5e1" text-rendering="geometricPrecision">built as a fixture for testing MCP gateways.</text>

  <!-- Capability bullets (kept short to fit alongside the code panel,
       which starts at x=720; the bullets line ends well before that
       boundary so the panel's left edge has clean breathing room). -->
  <g transform="translate(80, 478)" class="body" font-size="20" font-weight="500" text-rendering="geometricPrecision">
    <text fill="#94a3b8">12 deterministic tools  </text>
    <text x="240" fill="#5fe8df">&#8729;</text>
    <text x="258" fill="#94a3b8">  Postgres audit log  </text>
    <text x="445" fill="#5fe8df">&#8729;</text>
    <text x="463" fill="#94a3b8">  embedded portal</text>
  </g>

  <!-- Bottom URL with mono treatment + copper underscore -->
  <g transform="translate(80, 558)">
    <text x="0" y="0" class="mono" font-size="20" font-weight="500"
          fill="#5fe8df" text-rendering="geometricPrecision">github.com/plexara/mcp-test</text>
    <rect x="0" y="10" width="320" height="1.5" fill="#14b8ab" opacity="0.6" />
  </g>

  <!-- ============================================================ -->
  <!-- RIGHT BLOCK: stylized JSON-RPC tools/call envelope           -->
  <!-- The protocol IS the project's identity; rendering it here    -->
  <!-- communicates "this is an MCP server" instantly.              -->
  <!-- ============================================================ -->

  <g transform="translate(720, 120)">
    <!-- Soft glow behind the panel -->
    <rect x="-30" y="-30" width="500" height="450" rx="24" fill="url(#codeGlow)" />

    <!-- Code panel: 1px copper-tinted border, midnight surface, rounded.
         Same shape vocabulary as the .api-endpoint cards.
         Panel: 440 x 390. Internal padding budget:
           title bar: y=0..44 (44px tall)
           code:      y=64..344 (top padding 20px from title bar
                                 line, line-height 28px x 9 lines = 252,
                                 plus padding-bottom 28px)
           footer:    y=362..390 (28px tall) -->
    <rect x="0" y="0" width="440" height="390" rx="14"
          fill="#0a1424" stroke="#14b8ab" stroke-opacity="0.30" stroke-width="1" />

    <!-- Title bar separator -->
    <line x1="0" y1="44" x2="440" y2="44" stroke="#1e293b" stroke-width="1" />

    <!-- Three macOS-style window dots in copper tones. Centered
         vertically in the title bar (44/2 = 22). -->
    <g transform="translate(22, 22)">
      <circle cx="0"  cy="0" r="5" fill="#073d5c" />
      <circle cx="16" cy="0" r="5" fill="#1388ae" />
      <circle cx="32" cy="0" r="5" fill="#14b8ab" />
    </g>

    <!-- File label, vertically centered in the title bar (y=27 puts the
         baseline below center for a 13px font so glyphs sit on the
         center line). Horizontally centered between the right edge of
         the dots and the right edge of the panel: dots end at x=58, so
         center of (58 to 440) = 249. -->
    <text x="249" y="27" text-anchor="middle" class="mono" font-size="13" font-weight="500"
          fill="#5fe8df" letter-spacing="0.5" text-rendering="geometricPrecision">tools/call</text>

    <!-- Code body. Standard JSON pretty-print: every key uses ": " (one
         space) before its value, two-space indentation per nesting level.
         xml:space="preserve" stops SVG from collapsing the trailing space
         in the colon tspan (otherwise "key": "value" renders as
         "key":"value" because the space sits at a tspan boundary).
         Line-height 28px starting at y=82. -->
    <g class="mono" font-size="19" font-weight="400" text-rendering="geometricPrecision" xml:space="preserve">
      <!-- line 1: { -->
      <text x="28" y="82" fill="#64748b">{</text>

      <!-- line 2:   "jsonrpc": "2.0", -->
      <text x="48" y="110"><tspan fill="#5fe8df">"jsonrpc"</tspan><tspan fill="#64748b">: </tspan><tspan fill="#f1f5f9">"2.0"</tspan><tspan fill="#64748b">,</tspan></text>

      <!-- line 3:   "method": "tools/call", -->
      <text x="48" y="138"><tspan fill="#5fe8df">"method"</tspan><tspan fill="#64748b">: </tspan><tspan fill="#f1f5f9">"tools/call"</tspan><tspan fill="#64748b">,</tspan></text>

      <!-- line 4:   "params": { -->
      <text x="48" y="166"><tspan fill="#5fe8df">"params"</tspan><tspan fill="#64748b">: {</tspan></text>

      <!-- line 5:     "name": "whoami", -->
      <text x="68" y="194"><tspan fill="#5fe8df">"name"</tspan><tspan fill="#64748b">: </tspan><tspan fill="#f1f5f9">"whoami"</tspan><tspan fill="#64748b">,</tspan></text>

      <!-- line 6:     "arguments": {} -->
      <text x="68" y="222"><tspan fill="#5fe8df">"arguments"</tspan><tspan fill="#64748b">: {}</tspan></text>

      <!-- line 7:   }, -->
      <text x="48" y="250" fill="#64748b">},</text>

      <!-- line 8:   "id": 1 -->
      <text x="48" y="278"><tspan fill="#5fe8df">"id"</tspan><tspan fill="#64748b">: </tspan><tspan fill="#2dd3cb">1</tspan></text>

      <!-- line 9: } -->
      <text x="28" y="306" fill="#64748b">}</text>
    </g>

    <!-- Footer: dashed copper rule + three caption columns (status,
         center, latency). Sits in the bottom 44px of the panel. -->
    <line x1="20" y1="344" x2="420" y2="344" stroke="#14b8ab" stroke-opacity="0.22" stroke-width="1" stroke-dasharray="4 6" />
    <text x="20" y="368" class="mono" font-size="13" font-weight="500"
          fill="#94a3b8" letter-spacing="0.4" text-rendering="geometricPrecision">200 OK</text>
    <text x="220" y="368" text-anchor="middle" class="mono" font-size="13" font-weight="400"
          fill="#5fe8df" letter-spacing="0.4" text-rendering="geometricPrecision">audited &#8594; postgres</text>
    <text x="420" y="368" text-anchor="end" class="mono" font-size="13" font-weight="400"
          fill="#94a3b8" letter-spacing="0.4" text-rendering="geometricPrecision">12 ms</text>
  </g>
</svg>
