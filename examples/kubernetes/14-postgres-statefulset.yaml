# Single-replica Postgres for the mcp-test audit log + DB-backed API
# keys. 5Gi PVC sized for ~50M audit_events rows at the default
# 30-day retention with payloads on. Bump the storage request before
# scale-out demos.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: mcp-test
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: db
    app.kubernetes.io/part-of: mcp-test
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/name: postgres
        app.kubernetes.io/component: db
        app.kubernetes.io/part-of: mcp-test
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsUser: 70 # postgres uid in the alpine image
        runAsGroup: 70
        fsGroup: 70
      containers:
        - name: postgres
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "mcp", "-d", "mcp_test"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "mcp", "-d", "mcp_test"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
        # storageClassName: REPLACE_ME (omit to use cluster default)
